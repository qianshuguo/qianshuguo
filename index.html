<!DOCTYPE html>
<html lang='en'>
<head>
    <title>Qianshu Guo</title>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1' />
    <meta name='theme-color' content='#e8e4de'/>
    <link rel="preload" href="assets/fonts/PlayfairDisplay-Regular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="assets/fonts/EBGaramond-Regular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="assets/fonts/CormorantGaramond-Italic.woff2" as="font" type="font/woff2" crossorigin>
    <link href="assets/fonts/fonts.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #e8e4de; --text: #2d2926; --muted: #7a7068; }

        html, body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'EB Garamond', Georgia, serif;
            height: 100%;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 40px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(52px, 8vw, 96px);
            font-weight: 400;
            letter-spacing: .01em;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero .subtitle {
            font-size: 24px;
            font-style: italic;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 60px;
        }

        .hero-links {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-links a {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 400;
            color: var(--text);
            text-decoration: none;
            padding: 10px 0;
            letter-spacing: .01em;
            transition: color 0.2s;
        }
        .hero-links a:hover { color: var(--muted); }

        @media (max-width: 600px) {
            .hero { padding: 60px 24px; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Qianshu Guo</h1>
        <p class="subtitle">Composer <span class="amp">&amp;</span> Sound Designer</p>
        <div class="hero-links">
            <a href="about.html">About</a>
            <a href="works.html">Works</a>
            <a href="contact.html">Contact</a>
            <a href="cv.html">CV</a>
        </div>
    </div>
</body>
</html>
